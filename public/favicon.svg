<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="40%" stop-color="#e8a820"/>
      <stop offset="70%" stop-color="#c8850a"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1720"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Венок левая ветка -->
  <g fill="#c8920a" opacity="0.9">
    <ellipse cx="8" cy="32" rx="2.5" ry="1.2" transform="rotate(-80 8 32)"/>
    <ellipse cx="7" cy="26" rx="2.5" ry="1.2" transform="rotate(-65 7 26)"/>
    <ellipse cx="8" cy="20" rx="2.5" ry="1.2" transform="rotate(-50 8 20)"/>
    <ellipse cx="11" cy="15" rx="2.5" ry="1.2" transform="rotate(-35 11 15)"/>
    <ellipse cx="15" cy="11" rx="2.5" ry="1.2" transform="rotate(-20 15 11)"/>
    <ellipse cx="20" cy="8" rx="2.5" ry="1.2" transform="rotate(-5 20 8)"/>
    <ellipse cx="9" cy="38" rx="2.5" ry="1.2" transform="rotate(-95 9 38)"/>
    <ellipse cx="11" cy="44" rx="2.5" ry="1.2" transform="rotate(-110 11 44)"/>
    <ellipse cx="15" cy="49" rx="2.5" ry="1.2" transform="rotate(-125 15 49)"/>
    <ellipse cx="20" cy="54" rx="2.5" ry="1.2" transform="rotate(-140 20 54)"/>
  </g>

  <!-- Венок правая ветка -->
  <g fill="#c8920a" opacity="0.9">
    <ellipse cx="56" cy="32" rx="2.5" ry="1.2" transform="rotate(80 56 32)"/>
    <ellipse cx="57" cy="26" rx="2.5" ry="1.2" transform="rotate(65 57 26)"/>
    <ellipse cx="56" cy="20" rx="2.5" ry="1.2" transform="rotate(50 56 20)"/>
    <ellipse cx="53" cy="15" rx="2.5" ry="1.2" transform="rotate(35 53 15)"/>
    <ellipse cx="49" cy="11" rx="2.5" ry="1.2" transform="rotate(20 49 11)"/>
    <ellipse cx="44" cy="8" rx="2.5" ry="1.2" transform="rotate(5 44 8)"/>
    <ellipse cx="55" cy="38" rx="2.5" ry="1.2" transform="rotate(95 55 38)"/>
    <ellipse cx="53" cy="44" rx="2.5" ry="1.2" transform="rotate(110 53 44)"/>
    <ellipse cx="49" cy="49" rx="2.5" ry="1.2" transform="rotate(125 49 49)"/>
    <ellipse cx="44" cy="54" rx="2.5" ry="1.2" transform="rotate(140 44 54)"/>
  </g>

  <!-- Щит -->
  <path d="M32 7 L50 14 L50 34 Q50 50 32 58 Q14 50 14 34 L14 14 Z" fill="url(#shield)"/>
  <!-- Блик -->
  <path d="M26 10 L26 50 Q29 54 32 56" fill="rgba(255,255,255,0.13)" stroke="none"/>

  <!-- Буква Ф -->
  <text x="32" y="41" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="25" fill="#1a2332" opacity="0.9">Ф</text>
</svg>
